<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vini – Locanda Ulivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<aside id="left-sidebar"></aside>
<div id="page-content">
  <nav id="navbar"></nav>

  <section class="section-dark" style="flex:1">
    <div class="container">
      <div class="section-header">
        <span class="section-tag light">Cantina</span>
        <h2 style="color:#fff">I Nostri <em style="color:var(--gold)">Vini</em></h2>
        <p style="color:rgba(255,255,255,0.6)">Una selezione dei migliori vini veronesi e del Garda</p>
      </div>
      <div class="vini-grid" id="vini-grid"></div>
    </div>
  </section>

  <footer id="footer"></footer>
</div>

<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildLayout('vini');
  document.getElementById('vini-grid').innerHTML = SDATA.vini.map(v => `
    <div class="vino-card reveal">
      <div class="vc-head">
        <span class="vc-nome">${v.nome}</span>
        <span class="vc-prezzo">€ ${v.prezzo}</span>
      </div>
      <span class="vc-badge ${v.tipo}">${v.tipo.charAt(0).toUpperCase()+v.tipo.slice(1)}</span>
      <div class="vc-prod">${v.produttore}</div>
      <div class="vc-anno">Annata ${v.anno}</div>
      <div class="vc-desc">${v.descrizione}</div>
    </div>
  `).join('');
});
</script>
</body>
</html>
