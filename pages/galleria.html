<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galleria – Locanda Ulivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .g-slot { display: none; }
    .g-slot.loaded { display: block; }
    .g-empty {
      text-align: center; padding: 3rem; color: var(--text-light);
      grid-column: 1/-1;
    }
    .g-empty span { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .g-empty small { font-size: 0.82rem; }
  </style>
</head>
<body>
<aside id="left-sidebar"></aside>
<div id="page-content">
  <nav id="navbar"></nav>

  <section class="section" style="flex:1">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Atmosfera</span>
        <h2>La Nostra <em>Galleria</em></h2>
      </div>

      <div class="g-tabs">
        <button class="gtab active" data-g="interno">Interno</button>
        <button class="gtab" data-g="esterno">Esterno</button>
        <button class="gtab" data-g="piatti">I Piatti</button>
        <button class="gtab" data-g="dolci">Dolci</button>
        <button class="gtab" data-g="vini">I Vini</button>
      </div>

      <div class="g-grid" id="g-grid"></div>
    </div>
  </section>

  <footer id="footer"></footer>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-bg" id="lb-bg"></div>
  <img src="" alt="" class="lb-img" id="lb-img"/>
  <button class="lb-close" id="lb-close">✕</button>
</div>

<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script>
const MAX_FOTO = 20;

const CARTELLE = {
  interno: { label: 'Interno',  path: '../images/interno/' },
  esterno: { label: 'Esterno',  path: '../images/esterno/' },
  piatti:  { label: 'I Piatti', path: '../images/piatti/'  },
  dolci:   { label: 'Dolci',    path: '../images/dolci/'   },
  vini:    { label: 'I Vini',   path: '../images/vini/'    }
};

document.addEventListener('DOMContentLoaded', () => {
  buildLayout('galleria');
  renderGalleria('interno');

  document.querySelectorAll('.gtab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGalleria(btn.dataset.g);
    });
  });

  document.getElementById('lb-close').addEventListener('click', closeLb);
  document.getElementById('lb-bg').addEventListener('click', closeLb);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
});

function renderGalleria(cat) {
  const grid = document.getElementById('g-grid');
  const cartella = CARTELLE[cat];
  if (!cartella) return;

  grid.innerHTML = '';
  let totalErrors = 0;

  for (let i = 1; i <= MAX_FOTO; i++) {
    const slot = document.createElement('div');
    slot.className = 'g-slot';

    const img = document.createElement('img');
    img.alt = cartella.label + ' ' + i;
    img.loading = 'lazy';

    img.onload = () => {
      slot.classList.add('loaded');
      const empty = grid.querySelector('.g-empty');
      if (empty) empty.remove();
      slot.addEventListener('click', () => {
        document.getElementById('lb-img').src = img.src;
        document.getElementById('lb-img').alt = img.alt;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    };

    img.onerror = () => {
      slot.remove();
      totalErrors++;
      if (totalErrors === MAX_FOTO) {
        if (!grid.querySelector('.g-empty')) {
          grid.innerHTML = `
            <div class="g-empty">
              <span>📷</span>
              <p>Nessuna foto ancora in questa categoria.</p>
              <small>Carica le foto rinominandole <strong>foto1.jpg</strong>, <strong>foto2.jpg</strong>… nella cartella <strong>images/${cat}/</strong></small>
            </div>`;
        }
      }
    };

    img.src = cartella.path + 'foto' + i + '.jpg';
    slot.appendChild(img);
    grid.appendChild(slot);
  }
}

function closeLb() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
