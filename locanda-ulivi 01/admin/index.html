<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Locanda Ulivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="../images/stemma.jpg" alt="Stemma" class="login-stemma" onerror="this.style.display='none'"/>
    <h1>🔐 Area Admin</h1>
    <p>Locanda Ulivi – Pannello di gestione</p>
    <div class="login-form">
      <input type="password" id="pwd-input" placeholder="Password amministratore" autocomplete="current-password"/>
      <button id="btn-login" class="btn-green">Accedi</button>
      <p class="login-hint">Password predefinita: <code>ulivi2025</code><br/><small>(modificabile nel pannello)</small></p>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <img src="../images/stemma.jpg" alt="Stemma" class="sidebar-stemma" onerror="this.style.display='none'"/>
      <span>Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="snav active" data-section="info">🏠 Info Generali</a>
      <a href="#" class="snav" data-section="orari">🕐 Orari</a>
      <a href="#" class="snav" data-section="pranzo">🍽️ Pranzo Lavoro</a>
      <a href="#" class="snav" data-section="menu">📋 Menu</a>
      <a href="#" class="snav" data-section="vini">🍷 Vini</a>
      <a href="#" class="snav" data-section="foto">📷 Foto</a>
      <a href="#" class="snav" data-section="stemma">🎖️ Stemma</a>
      <a href="#" class="snav" data-section="prenotazioni">📅 Prenotazioni</a>
      <a href="#" class="snav" data-section="sicurezza">🔒 Sicurezza</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="../index.html" class="btn-outline-sm" target="_blank">👁 Vedi sito</a>
      <button id="btn-logout" class="btn-danger-sm">Esci</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="admin-main">
    <div class="admin-header">
      <h2 id="section-title">Info Generali</h2>
      <button class="btn-green" id="btn-save-top">💾 Salva tutto</button>
    </div>
    <div id="admin-content"><!-- filled by JS --></div>
  </main>

</div>

<div id="toast" class="toast"></div>

<script src="../js/data.js"></script>
<script src="admin.js"></script>
</body>
</html>
